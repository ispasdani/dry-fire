<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DRYFIRE — 3D Aim Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --ink: #0b0e11; /* deep gunmetal */
        --panel: rgba(11, 14, 17, 0.72);
        --line: rgba(255, 180, 84, 0.35);
        --amber: #ffb454; /* phosphor amber — HUD voice */
        --amber-hot: #ffd9a0;
        --hit: #9cffc3; /* confirm green */
        --miss: #ff5d6c;
        --text: #e8e4da;
        --dim: #8a8678;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--ink);
      }
      body {
        font-family:
          ui-monospace, "JetBrains Mono", "Cascadia Mono", Menlo, Consolas,
          monospace;
        color: var(--text);
        user-select: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: block;
        cursor: crosshair;
      }

      /* ---------- HUD ---------- */
      .hud {
        position: fixed;
        pointer-events: none;
        z-index: 5;
        letter-spacing: 0.08em;
      }
      .hud .lbl {
        font-size: 10px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.22em;
      }
      .hud .val {
        font-size: 22px;
        color: var(--amber);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      #hud-tl {
        top: 18px;
        left: 20px;
        display: flex;
        gap: 28px;
      }
      #hud-tr {
        top: 18px;
        right: 20px;
        text-align: right;
        display: flex;
        gap: 28px;
        flex-direction: row-reverse;
      }
      #hud-bl {
        bottom: 18px;
        left: 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 10px 14px;
        backdrop-filter: blur(4px);
      }
      #hud-bl table {
        border-collapse: collapse;
      }
      #hud-bl td {
        padding: 1px 10px 1px 0;
        font-size: 12px;
      }
      #hud-bl td.num {
        color: var(--amber);
        text-align: right;
        font-variant-numeric: tabular-nums;
        min-width: 54px;
      }
      #hud-br {
        bottom: 18px;
        right: 20px;
        text-align: right;
      }
      #ammo {
        font-size: 40px;
        font-weight: 800;
        color: var(--amber);
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      #ammo .cap {
        font-size: 14px;
        color: var(--dim);
        font-weight: 400;
      }
      #reloadbar {
        width: 120px;
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        margin: 8px 0 0 auto;
        display: none;
      }
      #reloadbar i {
        display: block;
        height: 100%;
        width: 0;
        background: var(--amber);
      }
      #reloadhint {
        font-size: 10px;
        color: var(--dim);
        margin-top: 6px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
      }

      /* streak flash */
      #streakval.pop {
        animation: pop 0.25s ease;
      }
      @keyframes pop {
        40% {
          transform: scale(1.35);
          color: var(--amber-hot);
        }
      }

      /* ---------- crosshair ---------- */
      #xh {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        z-index: 6;
        pointer-events: none;
      }
      #xh i {
        position: absolute;
        background: var(--text);
        opacity: 0.9;
      }
      #xh .h {
        width: 14px;
        height: 2px;
        left: -7px;
        top: -1px;
      }
      #xh .v {
        width: 2px;
        height: 14px;
        left: -1px;
        top: -7px;
      }
      #xh .dot {
        width: 2px;
        height: 2px;
        left: -1px;
        top: -1px;
        background: var(--amber);
      }
      /* hit marker — four diagonal ticks */
      #hm {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        z-index: 6;
        pointer-events: none;
        opacity: 0;
      }
      #hm i {
        position: absolute;
        width: 10px;
        height: 2px;
        background: var(--hit);
        box-shadow: 0 0 6px var(--hit);
      }
      #hm i:nth-child(1) {
        transform: translate(-14px, -12px) rotate(45deg);
      }
      #hm i:nth-child(2) {
        transform: translate(4px, -12px) rotate(-45deg);
      }
      #hm i:nth-child(3) {
        transform: translate(-14px, 10px) rotate(-45deg);
      }
      #hm i:nth-child(4) {
        transform: translate(4px, 10px) rotate(45deg);
      }
      #hm.on {
        animation: hm 0.22s ease-out;
      }
      @keyframes hm {
        0% {
          opacity: 1;
          transform: scale(1.5);
        }
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
      }

      /* score popups */
      .popup {
        position: fixed;
        z-index: 6;
        pointer-events: none;
        font-size: 15px;
        font-weight: 700;
        color: var(--hit);
        text-shadow: 0 0 8px rgba(156, 255, 195, 0.6);
        animation: rise 0.7s ease-out forwards;
      }
      @keyframes rise {
        0% {
          opacity: 1;
          transform: translate(-50%, 0);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -46px);
        }
      }

      /* ---------- overlays ---------- */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center,
          rgba(11, 14, 17, 0.82) 0%,
          rgba(11, 14, 17, 0.96) 100%
        );
      }
      .card {
        max-width: 560px;
        padding: 40px 48px;
        border: 1px solid var(--line);
        background: var(--panel);
        text-align: center;
      }
      .eyebrow {
        font-size: 11px;
        color: var(--amber);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      h1 {
        font-family:
          "Bahnschrift", "DIN Alternate", "Franklin Gothic Medium",
          "Arial Narrow", sans-serif;
        font-size: 54px;
        letter-spacing: 0.06em;
        font-weight: 800;
        color: var(--text);
        line-height: 1;
      }
      h1 span {
        color: var(--amber);
      }
      .sub {
        font-size: 12px;
        color: var(--dim);
        margin: 14px 0 26px;
        letter-spacing: 0.12em;
      }
      .keys {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 18px;
        text-align: left;
        margin: 0 auto 28px;
        width: fit-content;
        font-size: 12px;
      }
      .keys b {
        color: var(--amber);
        font-weight: 700;
        text-align: right;
      }
      .cta {
        display: inline-block;
        border: 1px solid var(--amber);
        color: var(--amber);
        padding: 12px 34px;
        font-size: 13px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        cursor: pointer;
        background: transparent;
        font-family: inherit;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .cta:hover {
        background: var(--amber);
        color: var(--ink);
      }
      .cta:focus-visible {
        outline: 2px solid var(--amber-hot);
        outline-offset: 3px;
      }
      #pause .card,
      #start .card {
        animation: fadein 0.3s ease;
      }
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
        }
      }
      .hidden {
        display: none !important;
      }
      #pausestats {
        font-size: 13px;
        line-height: 2;
        color: var(--text);
        margin-bottom: 24px;
      }
      #pausestats b {
        color: var(--amber);
      }

      /* fire flash vignette */
      #flash {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          ellipse at 62% 72%,
          rgba(255, 180, 84, 0.18),
          transparent 45%
        );
      }
      #flash.on {
        animation: ff 0.09s ease-out;
      }
      @keyframes ff {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .popup,
        #hm.on,
        #flash.on,
        #streakval.pop {
          animation-duration: 0.01s;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div class="hud" id="hud-tl">
      <div>
        <div class="lbl">Time</div>
        <div class="val" id="time">0:00</div>
      </div>
      <div>
        <div class="lbl">Targets</div>
        <div class="val" id="kills">0</div>
      </div>
    </div>
    <div class="hud" id="hud-tr">
      <div>
        <div class="lbl">Score</div>
        <div class="val" id="score">0</div>
      </div>
      <div>
        <div class="lbl">Streak</div>
        <div class="val" id="streakval">0</div>
      </div>
    </div>
    <div class="hud" id="hud-bl">
      <table>
        <tr>
          <td class="lbl">Shots</td>
          <td class="num" id="shots">0</td>
        </tr>
        <tr>
          <td class="lbl">Hits</td>
          <td class="num" id="hits">0</td>
        </tr>
        <tr>
          <td class="lbl">Accuracy</td>
          <td class="num" id="acc">—</td>
        </tr>
      </table>
    </div>
    <div class="hud" id="hud-br">
      <div id="ammo">30<span class="cap"> / 30</span></div>
      <div id="reloadbar"><i id="reloadfill"></i></div>
      <div id="reloadhint">R · Reload</div>
    </div>

    <div id="xh"><i class="h"></i><i class="v"></i><i class="dot"></i></div>
    <div id="hm"><i></i><i></i><i></i><i></i></div>
    <div id="flash"></div>

    <!-- Start screen -->
    <div class="overlay" id="start">
      <div class="card">
        <div class="eyebrow">Range 07 · Live Fire</div>
        <h1>DRY<span>FIRE</span></h1>
        <div class="sub">3D AIM TRAINER — HITSCAN + TRACER BALLISTICS</div>
        <div class="keys">
          <b>W A S D</b><span>Move</span> <b>Shift</b><span>Sprint</span>
          <b>Mouse</b><span>Look</span> <b>LMB</b
          ><span>Fire (hold for auto)</span> <b>R</b><span>Reload</span>
          <b>Esc</b><span>Pause / release cursor</span>
        </div>
        <button class="cta" id="play">Enter range</button>
      </div>
    </div>

    <!-- Pause screen -->
    <div class="overlay hidden" id="pause">
      <div class="card">
        <div class="eyebrow">Paused</div>
        <h1>CEASE <span>FIRE</span></h1>
        <div id="pausestats"></div>
        <button class="cta" id="resume">Resume</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      "use strict";
      /* =========================================================================
   DRYFIRE — single-file 3D aim trainer
   Hit registration : camera-center hitscan raycast (crosshair-true)
   Visual ballistics: pooled tracer bolts flying muzzle -> impact point
   ========================================================================= */

      // ---------------------------------------------------------------- constants
      const ARENA_HALF = 28; // arena half-size (walls at ±28)
      const EYE_HEIGHT = 1.7;
      const MOVE_SPEED = 7.5;
      const SPRINT_MULT = 1.6;
      const ACCEL = 60;
      const FRICTION = 10;
      const FIRE_RATE = 9; // rounds / second (hold to auto)
      const MAG_SIZE = 30;
      const RELOAD_TIME = 1.4; // seconds
      const TRACER_SPEED = 220; // units / second
      const MAX_TARGETS = 7;
      const RESPAWN_MIN = 0.6,
        RESPAWN_MAX = 1.6;

      // ---------------------------------------------------------------- renderer
      const canvas = document.getElementById("game");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0e11);
      scene.fog = new THREE.Fog(0x0b0e11, 30, 95);

      // ---------------------------------------------------------------- player rig
      // yaw on the body, pitch on the camera — standard FPS rig
      const camera = new THREE.PerspectiveCamera(
        75,
        innerWidth / innerHeight,
        0.05,
        200,
      );
      const player = new THREE.Object3D(); // yaw + position
      player.position.set(0, EYE_HEIGHT, 18);
      player.add(camera);
      scene.add(player);
      let pitch = 0;

      // ---------------------------------------------------------------- lighting
      scene.add(new THREE.HemisphereLight(0x3a4250, 0x14110d, 0.85));
      const sun = new THREE.DirectionalLight(0xfff2dd, 0.9);
      sun.position.set(14, 26, 10);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = sun.shadow.camera.bottom = -35;
      sun.shadow.camera.right = sun.shadow.camera.top = 35;
      scene.add(sun);

      // ---------------------------------------------------------------- arena
      const wallMeshes = []; // environment colliders for ray endpoints

      {
        // floor
        const floor = new THREE.Mesh(
          new THREE.PlaneGeometry(ARENA_HALF * 2, ARENA_HALF * 2),
          new THREE.MeshStandardMaterial({ color: 0x16191e, roughness: 0.95 }),
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        wallMeshes.push(floor);

        const grid = new THREE.GridHelper(
          ARENA_HALF * 2,
          28,
          0x2a2f38,
          0x1d2127,
        );
        grid.position.y = 0.01;
        scene.add(grid);

        // lane stripes pointing downrange — orients the player instantly
        const stripeMat = new THREE.MeshBasicMaterial({
          color: 0xffb454,
          transparent: true,
          opacity: 0.16,
        });
        for (const x of [-8, 0, 8]) {
          const s = new THREE.Mesh(
            new THREE.PlaneGeometry(0.18, 40),
            stripeMat,
          );
          s.rotation.x = -Math.PI / 2;
          s.position.set(x, 0.02, -4);
          scene.add(s);
        }
      }
      {
        // walls
        const wallMat = new THREE.MeshStandardMaterial({
          color: 0x1a1e24,
          roughness: 0.9,
        });
        const H = 9,
          L = ARENA_HALF * 2;
        const defs = [
          [0, H / 2, -ARENA_HALF, L, H, 0.5],
          [0, H / 2, ARENA_HALF, L, H, 0.5],
          [-ARENA_HALF, H / 2, 0, 0.5, H, L],
          [ARENA_HALF, H / 2, 0, 0.5, H, L],
        ];
        for (const [x, y, z, w, h, d] of defs) {
          const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
          m.position.set(x, y, z);
          m.receiveShadow = true;
          scene.add(m);
          wallMeshes.push(m);
        }
        // amber trim line on the back (downrange) wall
        const trim = new THREE.Mesh(
          new THREE.BoxGeometry(L, 0.12, 0.1),
          new THREE.MeshBasicMaterial({ color: 0xffb454 }),
        );
        trim.position.set(0, 5.6, -ARENA_HALF + 0.31);
        scene.add(trim);
      }

      // ---------------------------------------------------------------- weapon
      // Stylized geometric carbine, parented to the camera. The muzzle is only the
      // tracer's visual origin; hit detection always rays from the camera center.
      const weapon = new THREE.Group();
      let muzzleRef; // Object3D marking the muzzle tip
      {
        const gunmetal = new THREE.MeshStandardMaterial({
          color: 0x2b2f36,
          roughness: 0.45,
          metalness: 0.65,
        });
        const polymer = new THREE.MeshStandardMaterial({
          color: 0x1c1f24,
          roughness: 0.85,
        });
        const accent = new THREE.MeshStandardMaterial({
          color: 0xffb454,
          roughness: 0.4,
          emissive: 0x3d2a10,
        });

        const receiver = new THREE.Mesh(
          new THREE.BoxGeometry(0.09, 0.11, 0.55),
          gunmetal,
        );
        const barrel = new THREE.Mesh(
          new THREE.CylinderGeometry(0.022, 0.022, 0.42, 12),
          gunmetal,
        );
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.015, -0.45);
        const handguard = new THREE.Mesh(
          new THREE.BoxGeometry(0.075, 0.075, 0.3),
          polymer,
        );
        handguard.position.set(0, 0.005, -0.38);
        const grip = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.16, 0.07),
          polymer,
        );
        grip.position.set(0, -0.12, 0.12);
        grip.rotation.x = 0.35;
        const mag = new THREE.Mesh(
          new THREE.BoxGeometry(0.055, 0.14, 0.09),
          polymer,
        );
        mag.position.set(0, -0.12, -0.05);
        mag.rotation.x = -0.15;
        const stock = new THREE.Mesh(
          new THREE.BoxGeometry(0.07, 0.1, 0.22),
          polymer,
        );
        stock.position.set(0, -0.01, 0.35);
        const sightF = new THREE.Mesh(
          new THREE.BoxGeometry(0.015, 0.045, 0.015),
          accent,
        );
        sightF.position.set(0, 0.085, -0.52);
        const sightR = new THREE.Mesh(
          new THREE.BoxGeometry(0.05, 0.03, 0.02),
          gunmetal,
        );
        sightR.position.set(0, 0.08, 0.05);

        weapon.add(
          receiver,
          barrel,
          handguard,
          grip,
          mag,
          stock,
          sightF,
          sightR,
        );
        weapon.traverse((o) => {
          if (o.isMesh) o.castShadow = false;
        });

        muzzleRef = new THREE.Object3D();
        muzzleRef.position.set(0, 0.015, -0.68);
        weapon.add(muzzleRef);

        // muzzle flash: emissive cross sprite + point light, both pulsed on fire
        const flashGeo = new THREE.PlaneGeometry(0.16, 0.16);
        const flashMat = new THREE.MeshBasicMaterial({
          color: 0xffd9a0,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const f1 = new THREE.Mesh(flashGeo, flashMat);
        const f2 = new THREE.Mesh(flashGeo, flashMat);
        f2.rotation.z = Math.PI / 4;
        muzzleRef.add(f1, f2);
        weapon.userData.flashMat = flashMat;

        const flashLight = new THREE.PointLight(0xffb454, 0, 6, 2);
        muzzleRef.add(flashLight);
        weapon.userData.flashLight = flashLight;

        weapon.position.set(0.22, -0.18, -0.42); // right-hand hip/shoulder offset
        camera.add(weapon);
      }
      const WEAPON_HOME = weapon.position.clone();
      let recoilKick = 0; // weapon z kickback, recovers each frame
      let flashTimer = 0;
      let bobPhase = 0;

      // ---------------------------------------------------------------- tracer pool
      const tracerPool = [];
      const liveTracers = [];
      {
        const geo = new THREE.CylinderGeometry(0.012, 0.012, 1, 6);
        geo.translate(0, 0.5, 0); // pivot at tail so scaling stretches forward
        const mat = new THREE.MeshBasicMaterial({
          color: 0xffd9a0,
          transparent: true,
          opacity: 0.95,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        for (let i = 0; i < 24; i++) {
          const m = new THREE.Mesh(geo, mat);
          m.visible = false;
          scene.add(m);
          tracerPool.push(m);
        }
      }
      function fireTracer(from, to) {
        const mesh = tracerPool.pop();
        if (!mesh) return;
        const dir = to.clone().sub(from);
        const dist = dir.length();
        dir.normalize();
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        mesh.position.copy(from);
        mesh.scale.set(1, Math.min(1.6, dist), 1); // bolt length
        mesh.visible = true;
        liveTracers.push({ mesh, from: from.clone(), dir, dist, traveled: 0 });
      }
      function updateTracers(dt) {
        for (let i = liveTracers.length - 1; i >= 0; i--) {
          const t = liveTracers[i];
          t.traveled += TRACER_SPEED * dt;
          if (t.traveled >= t.dist) {
            t.mesh.visible = false;
            tracerPool.push(t.mesh);
            liveTracers.splice(i, 1);
            continue;
          }
          const remaining = t.dist - t.traveled;
          t.mesh.scale.y = Math.min(1.6, remaining);
          t.mesh.position.copy(t.from).addScaledVector(t.dir, t.traveled);
        }
      }

      // ---------------------------------------------------------------- particle bursts
      const burstPool = [];
      const liveBursts = [];
      const BURST_N = 26;
      function makeBurst() {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute(
          "position",
          new THREE.BufferAttribute(new Float32Array(BURST_N * 3), 3),
        );
        const mat = new THREE.PointsMaterial({
          size: 0.07,
          transparent: true,
          opacity: 1,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          color: 0xffb454,
        });
        const pts = new THREE.Points(geo, mat);
        pts.visible = false;
        scene.add(pts);
        return {
          pts,
          vels: new Array(BURST_N).fill(0).map(() => new THREE.Vector3()),
          life: 0,
          max: 0,
        };
      }
      for (let i = 0; i < 12; i++) burstPool.push(makeBurst());

      function spawnBurst(pos, color, speed = 4.5, life = 0.45, size = 0.07) {
        const b = burstPool.pop() || makeBurst();
        const arr = b.pts.geometry.attributes.position.array;
        for (let i = 0; i < BURST_N; i++) {
          arr[i * 3] = pos.x;
          arr[i * 3 + 1] = pos.y;
          arr[i * 3 + 2] = pos.z;
          b.vels[i]
            .set(Math.random() - 0.5, Math.random() - 0.3, Math.random() - 0.5)
            .normalize()
            .multiplyScalar(speed * (0.4 + Math.random() * 0.8));
        }
        b.pts.geometry.attributes.position.needsUpdate = true;
        b.pts.material.color.setHex(color);
        b.pts.material.opacity = 1;
        b.pts.material.size = size;
        b.pts.visible = true;
        b.life = 0;
        b.max = life;
        liveBursts.push(b);
      }
      function updateBursts(dt) {
        for (let i = liveBursts.length - 1; i >= 0; i--) {
          const b = liveBursts[i];
          b.life += dt;
          if (b.life >= b.max) {
            b.pts.visible = false;
            burstPool.push(b);
            liveBursts.splice(i, 1);
            continue;
          }
          const arr = b.pts.geometry.attributes.position.array;
          for (let j = 0; j < BURST_N; j++) {
            b.vels[j].y -= 9.5 * dt; // gravity
            arr[j * 3] += b.vels[j].x * dt;
            arr[j * 3 + 1] += b.vels[j].y * dt;
            arr[j * 3 + 2] += b.vels[j].z * dt;
          }
          b.pts.geometry.attributes.position.needsUpdate = true;
          b.pts.material.opacity = 1 - b.life / b.max;
        }
      }

      // shockwave rings on target destroy
      const rings = [];
      const ringGeo = new THREE.RingGeometry(0.3, 0.36, 32);
      function spawnRing(pos, color) {
        const m = new THREE.Mesh(
          ringGeo,
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          }),
        );
        m.position.copy(pos);
        m.lookAt(camera.getWorldPosition(new THREE.Vector3()));
        scene.add(m);
        rings.push({ m, life: 0 });
      }
      function updateRings(dt) {
        for (let i = rings.length - 1; i >= 0; i--) {
          const r = rings[i];
          r.life += dt;
          const k = r.life / 0.35;
          if (k >= 1) {
            scene.remove(r.m);
            r.m.material.dispose();
            rings.splice(i, 1);
            continue;
          }
          r.m.scale.setScalar(1 + k * 5);
          r.m.material.opacity = 0.9 * (1 - k);
        }
      }

      // ---------------------------------------------------------------- targets
      const targets = []; // active target records
      const targetMeshes = []; // meshes for raycasting
      const TARGET_COLORS = {
        static: 0xff6a3d,
        bob: 0xff8f5e,
        strafe: 0xffc46b,
      };
      const targetGeo = new THREE.SphereGeometry(0.42, 24, 18);
      const coreGeo = new THREE.SphereGeometry(0.16, 12, 10);

      function spawnTarget() {
        const r = Math.random();
        const type = r < 0.34 ? "static" : r < 0.67 ? "bob" : "strafe";
        const base = new THREE.Vector3(
          (Math.random() * 2 - 1) * 13,
          1.0 + Math.random() * 3.6,
          -14 - Math.random() * 11,
        );
        const color = TARGET_COLORS[type];
        const mat = new THREE.MeshStandardMaterial({
          color,
          emissive: color,
          emissiveIntensity: 0.55,
          roughness: 0.35,
        });
        const mesh = new THREE.Mesh(targetGeo, mat);
        const core = new THREE.Mesh(
          coreGeo,
          new THREE.MeshBasicMaterial({ color: 0xfff4e0 }),
        );
        mesh.add(core);
        mesh.position.copy(base);
        mesh.castShadow = true;
        scene.add(mesh);

        const rec = {
          mesh,
          type,
          base,
          phase: Math.random() * Math.PI * 2,
          speed: 0.8 + Math.random() * 1.4,
          span: 2 + Math.random() * 4, // strafe travel
          axis: Math.random() < 0.7 ? "x" : "y", // strafe direction
        };
        mesh.userData.rec = rec;
        targets.push(rec);
        targetMeshes.push(mesh);
      }
      function destroyTarget(rec, hitPoint) {
        scene.remove(rec.mesh);
        rec.mesh.material.dispose();
        targets.splice(targets.indexOf(rec), 1);
        targetMeshes.splice(targetMeshes.indexOf(rec.mesh), 1);
        spawnBurst(hitPoint, rec.mesh.material.color.getHex(), 6, 0.55, 0.1);
        spawnBurst(hitPoint, 0xfff4e0, 3, 0.35, 0.06);
        spawnRing(rec.mesh.position, 0xffb454);
        setTimeout(
          spawnTarget,
          (RESPAWN_MIN + Math.random() * (RESPAWN_MAX - RESPAWN_MIN)) * 1000,
        );
      }
      function updateTargets(t, dt) {
        for (const r of targets) {
          if (r.type === "bob") {
            r.mesh.position.y =
              r.base.y + Math.sin(t * r.speed + r.phase) * 0.9;
          } else if (r.type === "strafe") {
            const k = Math.sin(t * r.speed + r.phase) * r.span * 0.5;
            if (r.axis === "x") r.mesh.position.x = r.base.x + k;
            else r.mesh.position.y = Math.max(0.6, r.base.y + k * 0.5);
          }
          r.mesh.rotation.y += dt * 0.8;
        }
      }
      for (let i = 0; i < MAX_TARGETS; i++) spawnTarget();

      // ---------------------------------------------------------------- input
      const keys = {};
      let locked = false;
      let mouseDown = false;
      let started = false;

      addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (e.code === "KeyR") startReload();
      });
      addEventListener("keyup", (e) => (keys[e.code] = false));
      addEventListener("mousedown", (e) => {
        if (locked && e.button === 0) mouseDown = true;
      });
      addEventListener("mouseup", (e) => {
        if (e.button === 0) mouseDown = false;
      });

      addEventListener("mousemove", (e) => {
        if (!locked) return;
        const SENS = 0.0021;
        player.rotation.y -= e.movementX * SENS;
        pitch = Math.max(
          (-Math.PI / 2) * 0.99,
          Math.min((Math.PI / 2) * 0.99, pitch - e.movementY * SENS),
        );
        camera.rotation.x = pitch;
      });

      // pointer lock plumbing
      const startEl = document.getElementById("start");
      const pauseEl = document.getElementById("pause");
      function requestLock() {
        canvas.requestPointerLock();
      }
      document.getElementById("play").addEventListener("click", requestLock);
      document.getElementById("resume").addEventListener("click", requestLock);

      document.addEventListener("pointerlockchange", () => {
        locked = document.pointerLockElement === canvas;
        if (locked) {
          started = true;
          startEl.classList.add("hidden");
          pauseEl.classList.add("hidden");
          lastT = performance.now(); // don't integrate the paused gap
        } else if (started) {
          mouseDown = false;
          document.getElementById("pausestats").innerHTML =
            `Score <b>${stats.score}</b> · Targets <b>${stats.kills}</b><br>` +
            `Accuracy <b>${stats.shots ? Math.round((stats.hits / stats.shots) * 100) + "%" : "—"}</b> ` +
            `(${stats.hits}/${stats.shots})`;
          pauseEl.classList.remove("hidden");
        }
      });

      // ---------------------------------------------------------------- shooting
      const stats = {
        shots: 0,
        hits: 0,
        kills: 0,
        score: 0,
        streak: 0,
        time: 0,
      };
      let ammo = MAG_SIZE;
      let reloading = false,
        reloadT = 0;
      let fireCooldown = 0;

      const raycaster = new THREE.Raycaster();
      const CENTER = new THREE.Vector2(0, 0);
      const hmEl = document.getElementById("hm");
      const flashEl = document.getElementById("flash");

      function startReload() {
        if (reloading || ammo === MAG_SIZE || !locked) return;
        reloading = true;
        reloadT = 0;
        document.getElementById("reloadbar").style.display = "block";
      }
      function finishReload() {
        reloading = false;
        ammo = MAG_SIZE;
        document.getElementById("reloadbar").style.display = "none";
        updateHUD();
      }

      function shoot() {
        if (reloading) return;
        if (ammo <= 0) {
          startReload();
          return;
        }
        ammo--;
        stats.shots++;
        fireCooldown = 1 / FIRE_RATE;

        // --- hit registration: ray from the exact crosshair ---
        raycaster.setFromCamera(CENTER, camera);
        const hitT = raycaster.intersectObjects(targetMeshes, false)[0];
        const hitW = raycaster.intersectObjects(wallMeshes, false)[0];

        let endPoint,
          scored = false;
        if (hitT && (!hitW || hitT.distance < hitW.distance)) {
          endPoint = hitT.point.clone();
          scored = true;
        } else if (hitW) {
          endPoint = hitW.point.clone();
        } else {
          endPoint = raycaster.ray.at(120, new THREE.Vector3());
        }

        // --- visual ballistics: tracer from muzzle, converging on the aim point ---
        const muzzleWorld = muzzleRef.getWorldPosition(new THREE.Vector3());
        fireTracer(muzzleWorld, endPoint);

        // --- recoil + muzzle flash ---
        recoilKick = Math.min(recoilKick + 0.06, 0.14);
        pitch = Math.min(pitch + 0.0045, (Math.PI / 2) * 0.99);
        camera.rotation.x = pitch;
        flashTimer = 0.06;
        weapon.userData.flashLight.intensity = 2.4;
        weapon.userData.flashMat.opacity = 1;
        flashEl.classList.remove("on");
        void flashEl.offsetWidth;
        flashEl.classList.add("on");

        // --- resolve hit ---
        if (scored) {
          stats.hits++;
          stats.kills++;
          stats.streak++;
          const pts = 100 + stats.streak * 10;
          stats.score += pts;
          destroyTarget(hitT.object.userData.rec, endPoint);
          hmEl.classList.remove("on");
          void hmEl.offsetWidth;
          hmEl.classList.add("on");
          scorePopup(endPoint, "+" + pts);
          const sv = document.getElementById("streakval");
          sv.classList.remove("pop");
          void sv.offsetWidth;
          sv.classList.add("pop");
        } else {
          stats.streak = 0;
          if (hitW) spawnBurst(endPoint, 0x9aa3ad, 2.5, 0.3, 0.045); // wall sparks
        }
        updateHUD();
      }

      function scorePopup(worldPos, text) {
        const v = worldPos.clone().project(camera);
        if (v.z > 1) return; // behind camera
        const el = document.createElement("div");
        el.className = "popup";
        el.textContent = text;
        el.style.left = (v.x * 0.5 + 0.5) * innerWidth + "px";
        el.style.top = (-v.y * 0.5 + 0.5) * innerHeight - 14 + "px";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 720);
      }

      // ---------------------------------------------------------------- HUD
      const $ = (id) => document.getElementById(id);
      function updateHUD() {
        $("shots").textContent = stats.shots;
        $("hits").textContent = stats.hits;
        $("acc").textContent = stats.shots
          ? Math.round((stats.hits / stats.shots) * 100) + "%"
          : "—";
        $("score").textContent = stats.score;
        $("streakval").textContent = stats.streak;
        $("kills").textContent = stats.kills;
        $("ammo").innerHTML =
          ammo + '<span class="cap"> / ' + MAG_SIZE + "</span>";
      }
      function updateClock() {
        const s = Math.floor(stats.time);
        $("time").textContent =
          Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
      }

      // ---------------------------------------------------------------- movement
      const vel = new THREE.Vector3();
      const fwd = new THREE.Vector3(),
        rgt = new THREE.Vector3(),
        wish = new THREE.Vector3();

      function updateMovement(dt) {
        fwd.set(0, 0, -1).applyQuaternion(player.quaternion);
        fwd.y = 0;
        fwd.normalize();
        rgt.set(1, 0, 0).applyQuaternion(player.quaternion);
        rgt.y = 0;
        rgt.normalize();

        wish.set(0, 0, 0);
        if (keys["KeyW"]) wish.add(fwd);
        if (keys["KeyS"]) wish.sub(fwd);
        if (keys["KeyD"]) wish.add(rgt);
        if (keys["KeyA"]) wish.sub(rgt);

        const moving = wish.lengthSq() > 0;
        if (moving) {
          wish.normalize();
          const max =
            MOVE_SPEED *
            (keys["ShiftLeft"] || keys["ShiftRight"] ? SPRINT_MULT : 1);
          vel.addScaledVector(wish, ACCEL * dt);
          if (vel.length() > max) vel.setLength(max);
        } else {
          const drop = Math.max(0, 1 - FRICTION * dt);
          vel.multiplyScalar(drop);
          if (vel.lengthSq() < 0.0001) vel.set(0, 0, 0);
        }
        player.position.addScaledVector(vel, dt);
        const LIM = ARENA_HALF - 0.8;
        player.position.x = Math.max(-LIM, Math.min(LIM, player.position.x));
        player.position.z = Math.max(-LIM, Math.min(LIM, player.position.z));

        // weapon bob + sway + recoil recovery
        const speedFrac = vel.length() / (MOVE_SPEED * SPRINT_MULT);
        bobPhase += dt * (4 + speedFrac * 8);
        const bobX = Math.sin(bobPhase) * 0.008 * speedFrac;
        const bobY = Math.abs(Math.cos(bobPhase)) * 0.012 * speedFrac;
        const idleY = Math.sin(performance.now() * 0.0012) * 0.003;
        recoilKick = Math.max(0, recoilKick - dt * 0.6);
        weapon.position.set(
          WEAPON_HOME.x + bobX,
          WEAPON_HOME.y - bobY + idleY,
          WEAPON_HOME.z + recoilKick,
        );
        weapon.rotation.x = recoilKick * 0.9;
      }

      // ---------------------------------------------------------------- main loop
      let lastT = performance.now();
      function loop(now) {
        requestAnimationFrame(loop);
        const dt = Math.min(0.05, (now - lastT) / 1000);
        lastT = now;
        const t = now / 1000;

        if (locked) {
          stats.time += dt;
          updateClock();
          updateMovement(dt);

          fireCooldown -= dt;
          if (mouseDown && fireCooldown <= 0) shoot();

          if (reloading) {
            reloadT += dt;
            $("reloadfill").style.width =
              Math.min(100, (reloadT / RELOAD_TIME) * 100) + "%";
            if (reloadT >= RELOAD_TIME) finishReload();
          }
        }

        // VFX always animate (even on pause screen, behind the blur)
        updateTargets(t, dt);
        updateTracers(dt);
        updateBursts(dt);
        updateRings(dt);

        if (flashTimer > 0) {
          flashTimer -= dt;
          if (flashTimer <= 0) {
            weapon.userData.flashLight.intensity = 0;
            weapon.userData.flashMat.opacity = 0;
          }
        }

        renderer.render(scene, camera);
      }
      requestAnimationFrame(loop);

      // ---------------------------------------------------------------- resize
      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      updateHUD();
    </script>
  </body>
</html>
